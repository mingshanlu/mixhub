<!DOCTYPE html>
<html>

  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
  </head>

  <body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.registerEditorComponent({
        id: "youtube",
        label: "YouTube 影片 (可選比例)",
        fields: [
          { name: "id", label: "影片 ID", widget: "string" },
          { name: "isShort", label: "這是 Shorts (直向 9:16) 嗎？", widget: "boolean", default: false }
        ],
        // 匹配包含 class 的結構
        pattern: /<div class="video-wrapper (video-16-9|video-9-16)"><iframe src="https:\/\/www\.youtube\.com\/embed\/(\S+)"[\s\S]*?><\/iframe><\/div>/,

        fromBlock: function (match) {
          return {
            isShort: match[1] === "video-9-16",
            id: match[2]
          };
        },

        toBlock: function (obj) {
          const ratioClass = obj.isShort ? "video-9-16" : "video-16-9";
          return (
            '<div class="video-wrapper ' + ratioClass + '">' +
            '<iframe src="https://www.youtube.com/embed/' + obj.id + '" ' +
            'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" ' +
            'allowfullscreen></iframe>' +
            '</div>'
          );
        },

        toPreview: function (obj) {
          const type = obj.isShort ? "直向 Shorts (9:16)" : "一般影片 (16:9)";
          return '<div style="background:#f0f0f0; padding:10px; border:1px solid #ccc; text-align:center;">' +
            '<strong>' + type + '</strong><br>ID: ' + obj.id + '</div>';
        }
      });
    </script>
  </body>

</html>
